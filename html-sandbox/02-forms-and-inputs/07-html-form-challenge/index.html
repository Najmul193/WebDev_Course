<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML & CSS Sandbox</title>
</head>

<body>
  <h1>Apartment Search</h1>
  <form>
    <div>
      <label for="location">
        Location
        <input type="text">
      </label>
    </div>
    <br>
    <div>
      <label for="price">Monthly price</label>
      <input type="range" name="price" id="price" min="500" max="5000" step="100">
    </div>
    <br>
    <div>
      <label for="bedrooms">Number of bedrooms</label>
      <input type="number" name="bedrooms" id="bedrooms" min="1" max="10">
    </div>
    <br>
    <div>
      <label for="bathrooms">Number of bathrooms</label>
      <input type="number" name="bathrooms" id="bathrooms" min="1" max="5">
    </div>
    <br>
    <div>
      <label for="pet">Pets Allowed</label>
      <input type="radio" name="pet" id="pet" value="yes">
      <label for="pet">Yes</label>
      <input type="radio" name="pet" id="pet" value="no">
      <label for="pet">No</label>
    </div>
    <br>
    <div>
      <label for="date">Date Available</label>
      <input type="date" name="date" id="date">
    </div>
    <br>
    <input type="submit" value="Submit">
  </form>
</body>

</html>
