<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML & CSS Sandbox</title>
</head>

<body>
  <h1>HTML & CSS Sandbox - Lists</h1>

  <!-- Unordered List -->
  <ul>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
  </ul>

  <!-- Ordered List -->
  <ol>
    <li>First Item</li>
    <li>Second Item</li>
    <li>Third Item</li>
  </ol>

  <!-- Nested List -->
  <ul>
    <li>Item 1
      <ul>
        <li>Subitem 1.1</li>
        <li>Subitem 1.2</li>
      </ul>
    </li>
    <li>Item 2
      <ol>
        <li>Subitem 2.1</li>
        <li>Subitem 2.2</li>
      </ol>
    </li>
    <li>Item 3</li>
  </ul>
  <!-- Definition List -->
  <dl>
    <dt>Term 1</dt>
    <dd>Definition 1</dd>
    <dt>Term 2</dt>
    <dd>Definition 2</dd>
  </dl>
</body>

</html>
