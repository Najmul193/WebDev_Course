<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML & CSS Sandbox</title>
</head>

<body>
  <h2>Image With a Relative Path</h2>

  <img src="images/landscape.jpg" alt="Landscape" width="400" height="300" title="landscape" />
  <h2>Image With an Absolute Path</h2>

  <img src="https://picsum.photos/200/300" alt="Random Image">
  <!-- Fig and Figcaption  -->
  <figure>

    <img src="images/landscape.jpg" alt="Landscape" width="400" height="300" title="landscape" />
    <figcaption>Landscape Image</figcaption>
  </figure>

</body>

</html>
